{% extends "base.html" %}

{% block title %}Server Error - Flask Azure SSO{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-octagon text-danger" style="font-size: 5rem;"></i>
                <h2 class="mt-4">500 - Server Error</h2>
                <p class="lead text-muted">Something went wrong on our end.</p>
                
                <div class="alert alert-danger mt-4 text-start">
                    <p class="mb-0 small">
                        We're sorry for the inconvenience. Our team has been notified and is working to fix the issue.
                    </p>
                </div>
                
                <div class="mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="bi bi-house"></i> Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
