{% extends "base.html" %}

{% block title %}Page Not Found - Flask Azure SSO{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center p-5">
                <i class="bi bi-question-circle text-muted" style="font-size: 5rem;"></i>
                <h2 class="mt-4">404 - Page Not Found</h2>
                <p class="lead text-muted">The page you're looking for doesn't exist.</p>
                
                <div class="mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="bi bi-house"></i> Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
